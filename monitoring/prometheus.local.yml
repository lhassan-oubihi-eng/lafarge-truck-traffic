# ==============================================================================
# Configuration Prometheus - MODE LOCAL (test sur poste de développement)
# Contrairement à monitoring/prometheus.yml (mode AWS, scraping via l'ALB et
# découverte EC2), ce fichier scrape directement les conteneurs Docker locaux
# via leur nom de service sur le réseau Docker Compose.
# ==============================================================================

global:
  scrape_interval: 10s
  evaluation_interval: 10s
  external_labels:
    environment: "local"
    project: "lafarge-truck-traffic"

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

scrape_configs:

  # Application FastAPI, jointe directement via le nom de service Docker "app"
  - job_name: "truck-traffic-app"
    metrics_path: /metrics
    static_configs:
      - targets: ["app:8000"]
        labels:
          service: "truck-traffic-app"
          tier: "frontend"

  # Node Exporter local (statistiques CPU/RAM de la machine hôte/conteneur),
  # cible statique unique puisqu'il n'y a pas d'Auto Scaling Group en local.
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
