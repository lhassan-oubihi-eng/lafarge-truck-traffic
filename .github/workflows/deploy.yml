name: Deploy to AWS

on:
  push:
    branches: [ main, feat/s3-stateful-integration ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: الاختبار والأمان
  test-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Start LocalStack Docker Container
        run: |
          docker run -d -p 4566:4566 --name localstack localstack/localstack:latest
          echo "Waiting for LocalStack health endpoint..."
          for i in {1..15}; do
            if curl -s http://localhost:4566/_localstack/health | grep -q '"features"\|"services"\|"available"'; then
              echo "LocalStack is up and running!"
              break
            fi
            echo "Waiting... ($i/15)"
            sleep 2
          done
      - name: Setup Python
        uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c
        with:
          python-version: '3.12'
      - name: Install dependencies
        env:
          PIP_REQUIRE_HASHES: "0"
        run: |
          python -m pip install --only-binary=:all: pip==24.0
          if [ -f app/requirements.txt ]; then pip install --no-cache-dir --only-binary=:all: -r app/requirements.txt; fi
          pip install --no-cache-dir --only-binary=:all: pytest==8.3.2 httpx==0.27.0 pytest-cov==5.0.0
      - name: Create mock S3 bucket in LocalStack
        run: |
          pip install --no-cache-dir --only-binary=:all: awscli==1.36.24
          aws --endpoint-url=http://localhost:4566 s3 mb s3://truck-traffic-logs || true
      - name: Run Tests
        env:
          AWS_ENDPOINT_URL: http://localhost:4566
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test  # pragma: allowlist secret
          AWS_DEFAULT_REGION: eu-west-3
          S3_BUCKET_NAME: truck-traffic-logs
        run: PYTHONPATH=$PYTHONPATH:. pytest --cov=app --cov-report=xml app/tests/
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@c07df6fec6fa692e6fd1200d50aaa1fdd66f03c8
        with:
          scan-type: 'fs'
          exit-code: '1'
          ignore-unfixed: true

  # Job 2: تحليل الجودة
  sonarqube:
    needs: test-and-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@2f77a1ec69fb1d595b06f35ab27e97605bdef703
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=lhassan-oubihi-eng_lafarge-truck-traffic
            -Dsonar.organization=lhassan-oubihi-eng
            -Dsonar.python.version=3.12
            -Dsonar.sources=app
            -Dsonar.tests=app/tests
            -Dsonar.exclusions=app/tests/**
            -Dsonar.terraform.provider.aws.version=5.0
            -Dsonar.coverage.exclusions=**/*.tf,terraform/**/*.tf,**/Dockerfile,**/tests/**
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.qualitygate.wait=true

  # Job 3: بناء ورفع Docker
  docker:
    needs: test-and-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # هادي رجعات هي الأولى هنا باش يلقى الملف
      - name: Inject Discord Webhook
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          sed -i "s|DISCORD_WEBHOOK_PLACEHOLDER|${DISCORD_WEBHOOK}|g" monitoring/alertmanager.yml
      - name: Login to Docker Hub
        uses: docker/login-action@c66a8fcb2472d4283042d726b2a061b43b3f49ab
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@cb941d0b895b09c17fa011d41c411b33c752cf28
        with:
          context: ./app
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/truck-traffic-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/truck-traffic-app:${{ github.sha }}

  # Job 4: الـ Deployment
  deploy:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@9ae780b171afa8c5a3a6a2d154a765b709492482
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@37c3618610d60f92cc57cb7f7e74c2569db0fcd6
      - name: Terraform Apply
        env:
          TF_VAR_app_docker_image: ${{ secrets.DOCKERHUB_USERNAME }}/truck-traffic-app:${{ github.sha }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_db_root_password: ${{ secrets.DB_ROOT_PASSWORD }}
          TF_VAR_certificate_arn: ${{ secrets.ACM_CERTIFICATE_ARN }}
          TF_VAR_public_key_content: ${{ secrets.AWS_PUBLIC_KEY }}
          TF_VAR_dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          TF_VAR_dockerhub_password: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve
      - name: Refresh AWS ASG
        run: |
          ASG_NAME="lafarge-truck-traffic-asg"
          REGION="eu-west-3"

          # Cancel any in-progress instance refresh and wait for full completion
          echo "Checking for in-progress or pending instance refreshes..."
          IN_PROGRESS=$(aws autoscaling describe-instance-refreshes \
            --auto-scaling-group-name "$ASG_NAME" \
            --region "$REGION" \
            --query "InstanceRefreshes[?Status=='InProgress' || Status=='Pending' || Status=='Cancelling'].InstanceRefreshId" \
            --output text)

          if [ -n "$IN_PROGRESS" ]; then
            echo "Cancelling stuck refresh: $IN_PROGRESS"
            aws autoscaling cancel-instance-refresh \
              --auto-scaling-group-name "$ASG_NAME" \
              --region "$REGION" || true
            # Wait for cancellation to fully complete (up to 5 minutes)
            echo "Waiting for cancellation to complete..."
            for i in $(seq 1 30); do
              STATUS=$(aws autoscaling describe-instance-refreshes \
                --auto-scaling-group-name "$ASG_NAME" \
                --region "$REGION" \
                --query "InstanceRefreshes[0].Status" \
                --output text)
              if [ "$STATUS" == "Cancelled" ] || [ "$STATUS" == "Successful" ] || [ "$STATUS" == "Failed" ]; then
                echo "Refresh is now in status: $STATUS"
                break
              fi
              echo "Waiting for cancellation... ($i/30) current status: $STATUS"
              sleep 10
            done
          fi

          # Start a new instance refresh
          echo "Triggering new instance refresh..."
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "$ASG_NAME" \
            --region "$REGION"

      - name: Discord notification
        if: always()
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          title: "Lafarge Pipeline Status"
          description: "Build #${{ github.run_number }} finished with status: ${{ job.status }}"
          color: ${{ job.status == 'success' && '#00FF00' || '#FF0000' }}