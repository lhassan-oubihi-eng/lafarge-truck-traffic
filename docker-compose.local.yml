
version: '3.8'

services:
  # --------------------------------------------------------------------
  # LocalStack Mock AWS Services
  # --------------------------------------------------------------------
  localstack:
    image: localstack/localstack:3.7
    container_name: localstack-local
    restart: unless-stopped
    ports:
      - "4566:4566"
    environment:
      - SERVICES=secretsmanager,s3,rds
      - DEBUG=0
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - DB_HOST=db.local
      - DB_PORT=5432
      - DB_NAME=truck_traffic
      - DB_USER=admin
      - DB_PASSWORD=changeme
    volumes:
      - localstack_data:/var/lib/localstack
      - ./localstack-init:/etc/localstack/init/ready.d
    networks:
      - local-net

  # --------------------------------------------------------------------
  # Application Truck Traffic Management
  # --------------------------------------------------------------------
  app:
    build:
      context: ./app
      dockerfile: Dockerfile.local
    container_name: truck-traffic-app-local
    restart: unless-stopped
    group_add:
      - "0"
    depends_on:
      - localstack
    ports:
      - "8080:8000"
    environment:
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_ENDPOINT_URL=http://localstack:4566
      - DB_SECRET_NAME=lafarge/truck-traffic/local/db
      - AWS_SECRET_NAME=lafarge/truck-traffic/local/aws
      - DB_HOST=db.local
      - DB_PORT=5432
      - DB_NAME=truck_traffic
      - DB_USER=admin
      - DB_PASSWORD=changeme
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - local-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # --------------------------------------------------------------------
  # Jenkins CI/CD
  # --------------------------------------------------------------------
  jenkins:
    build:
      context: .
      dockerfile: jenkins-config/Dockerfile
    container_name: jenkins-local
    restart: unless-stopped
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - local-net
    user: root

  # --------------------------------------------------------------------
  # Node Exporter
  # --------------------------------------------------------------------
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter-local
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)(3688|/)"
    ports:
      - "9100:9100"
    networks:
      - local-net

  # --------------------------------------------------------------------
  # Prometheus
  # --------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus-local
    restart: unless-stopped
    depends_on:
      - app
      - node-exporter
    volumes:
      - ./monitoring/prometheus.local.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_local_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    networks:
      - local-net

  # --------------------------------------------------------------------
  # Alertmanager
  # --------------------------------------------------------------------
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager-local
    restart: unless-stopped
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_local_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    ports:
      - "9093:9093"
    networks:
      - local-net

  # --------------------------------------------------------------------
  # Grafana
  # --------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana-local
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_local_data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - local-net
      
 
 
 
  # --------------------------------------------------------------------
  # SonarQube
  # --------------------------------------------------------------------
  sonarqube:
    image: sonarqube:community
    container_name: sonarqube-local
    restart: unless-stopped
    ports:
      - "9000:9000"
    networks:
      - local-net
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions   

networks:
  local-net:
    driver: bridge

volumes:
  localstack_data:
  prometheus_local_data:
  alertmanager_local_data:
  grafana_local_data:
  jenkins_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
